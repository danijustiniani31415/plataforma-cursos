<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Panel de Administrador</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<button onclick="window.location.href='index.html#cursos'" style="
padding:10px 20px;
margin-bottom:20px;
background:#002855;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
">
← Volver a cursos
</button>
  <h1>🎓 Panel de Administración</h1>

<section>
  <h2>👥 Crear cuenta de usuario</h2>

  <div id="info-empresa"></div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:700px;">
    <input type="text" id="nuevo-nombres" placeholder="Nombres *" />
    <input type="text" id="nuevo-apellidos" placeholder="Apellidos *" />
    <select id="nuevo-doc-tipo">
      <option value="DNI">DNI</option>
      <option value="CE">Carnet de Extranjería</option>
      <option value="PASAPORTE">Pasaporte</option>
    </select>
    <div>
      <input type="text" id="nuevo-dni" placeholder="Nº documento * (contraseña inicial)"
             oninput="this.value=this.value.replace(/[^0-9]/g,'')" maxlength="12" style="width:100%; box-sizing:border-box;" />
      <span id="dni-mensaje" style="font-size:0.85rem;"></span>
      <span id="nuevo-dni-reniec-msg" style="font-size:0.8rem; color:#555;"></span>
    </div>
    <input type="email" id="nuevo-email" placeholder="Correo electrónico *" />
    <input type="text" id="nuevo-telefono" placeholder="Teléfono (opcional)" />
    <select id="nuevo-cargo">
      <option value="">-- Selecciona cargo --</option>
    </select>
    <input type="date" id="nuevo-fecha-ingreso" />
  </div>
  <button onclick="crearUsuario()" class="btn-primary" style="margin-top:15px;">
    Crear usuario
  </button>
</section>

  <hr>

  <section>
  <h2>📚 Subir nuevo curso</h2>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:700px;">
    <input type="text" id="titulo-curso" placeholder="Nombre del curso *" />
    <input type="text" id="codigo-prefijo" placeholder="Prefijo del código (ej: IPERC, TEA) *" 
           oninput="this.value=this.value.toUpperCase()" />
    <input type="number" id="duracion-curso" placeholder="Duración en horas *" min="1" />
    <input type="text" id="url-material" placeholder="URL del material (PDF, OneDrive)" />
    <input type="text" id="url-video" placeholder="URL del video (YouTube)" />
  </div>
  <button onclick="subirCurso()" class="btn-primary" style="margin-top:15px;">
    Subir curso
  </button>
</section>

  <hr>

  <section>
    <h2>📋 Ver registros</h2>
    <button onclick="cargarRegistros()">Mostrar registros</button>
    <table border="1" id="tabla-registros">
      <thead>
        <tr>
          <th>Email</th>
          <th>Curso</th>
          <th>Nota</th>
          <th>Fecha</th>
          <th>Certificado</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <hr>

  <section>
    <h2>🔐 Resetear contraseña</h2>
    <input type="email" id="email-reset" placeholder="Correo del usuario" />
    <button onclick="resetearContrasena()">Enviar enlace de reseteo</button>
  </section>

  <script type="module" src="admin.js"></script>
</body>
</html>

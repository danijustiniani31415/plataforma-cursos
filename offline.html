<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión · CV Global SST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3.5rem; margin-bottom: 16px; }
    h1 { color: #002855; font-size: 1.4rem; margin-bottom: 10px; }
    p  { color: #666; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #002855;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión a internet</h1>
    <p>
      Para acceder a la plataforma de capacitaciones necesitas conexión a internet.
      Verifica tu red y vuelve a intentarlo.
    </p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>

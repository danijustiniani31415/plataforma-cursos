<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#002855" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Plataforma de Capacitación · CV Global</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ░░ SPLASH SCREEN ░░ -->
  <div id="splash-screen">
    <img src="logo.png" id="splash-logo" alt="CV Global" />
    <div id="splash-text">Cargando plataforma</div>
    <div class="splash-bar"></div>
  </div>

  <!-- ░░ HEADER ░░ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="logo.png" alt="CV Global" class="header-logo" />
        <div>
          <div class="header-title">CV Global S.A.C.</div>
          <div class="header-subtitle">Plataforma de Capacitación SST</div>
        </div>
      </div>
      <div class="header-actions">
        <button onclick="logout()" class="btn-logout" id="btn-logout" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Salir
        </button>
      </div>
    </div>
  </header>

  <!-- ░░ MAIN ░░ -->
  <main class="app-main">

    <!-- 🔐 LOGIN -->
    <section id="login-section" class="container" style="max-width:420px; margin:40px auto;">
      <div class="login-header">
        <div class="login-icon">🔐</div>
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
      </div>
      <div class="form-group">
        <input type="email" id="email" placeholder="Correo electrónico" autocomplete="email" />
        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" />
        <button onclick="login()" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Ingresar
        </button>
      </div>
      <p class="link-muted">
        <a href="recuperar-clave.html">¿Olvidaste tu contraseña?</a>
      </p>
    </section>

    <!-- 📚 CURSOS DISPONIBLES -->
    <section id="cursos-disponibles" style="display:none;" class="container">
      <h2>📚 Mis Cursos</h2>
      <p class="section-desc">Selecciona un curso para comenzar tu capacitación</p>
      <div id="lista-cursos" class="cursos-grid"></div>
    </section>

    <!-- 📺 CURSO DETALLE -->
    <section id="curso-section" style="display:none;" class="container">
      <h2 id="titulo-curso" style="margin-bottom:16px; font-size:1.1rem;"></h2>

      <!-- Contenido dinámico de pasos -->
      <div id="video-curso"></div>

      <!-- 🎓 CERTIFICADO -->
      <section id="certificado-section" style="display:none;">
        <div class="certificado-banner">
          <span class="certificado-icon">🏆</span>
          <h3 class="certificado-title">¡Curso Completado!</h3>
          <p class="certificado-desc">Has aprobado satisfactoriamente. Tu certificado está listo.</p>
          <button onclick="generarCertificado()" class="btn-cert">
            🎓 Obtener Certificado
          </button>
        </div>
      </section>
    </section>

    <!-- ⚙️ PANEL ADMIN -->
    <div id="admin-panel" style="display:none;"></div>

  </main>

  <!-- ░░ SCRIPTS ░░ -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 600);
        }
      }, 2000);
    });
  </script>

  <script type="module" src="main.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="certificado.js"></script>

</body>
</html>
